<html lang="de">
<head>
    <meta charset="UTF-8">

    <title>Ben | Gothic Butterfly Glass</title>
    <style>
        /* --- GRUND-SETUP --- */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #050208;
            background-image: 
                radial-gradient(circle at center, rgba(61, 26, 99, 0.4) 0%, #050208 70%),
                url('https://www.transparenttextures.com/patterns/dark-matter.png');
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            overflow: hidden;
        }

        /* --- FADE-IN ANIMATION --- */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); filter: blur(5px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        .reveal { opacity: 0; animation: fadeInUp 0.8s ease-out forwards; }
        .d-img { animation-delay: 0.1s; opacity: 1 !important; } 
        .d-h1  { animation-delay: 0.2s; }
        .d-bio { animation-delay: 0.3s; }
        .btn-1 { animation-delay: 0.4s; }
        .btn-2 { animation-delay: 0.5s; }
        .btn-3 { animation-delay: 0.6s; }
        .btn-4 { animation-delay: 0.7s; }
        .btn-5 { animation-delay: 0.8s; }

        /* --- DIE KARTE --- */
        .profile-card {
            background-color: rgba(15, 10, 20, 0.75); 
            border: 1px solid rgba(162, 89, 255, 0.2); 
            border-radius: 50px 50px 30px 30px; 
            padding: 40px 25px; 
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.9), inset 0 0 20px rgba(162, 89, 255, 0.1); 
            width: 100%;
            max-width: 350px;
            text-align: center;
            z-index: 10;
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            position: relative;
        }

        /* --- SCHMETTERLINGE --- */
        .inner-butterfly-box {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .butterfly {
            position: absolute;
            width: 24px; height: 24px;
            opacity: 0;
            animation: butterfly-fly 10s infinite ease-in-out;
        }

        .butterfly::after {
            content: '';
            position: absolute;
            top: 10px; left: 50%; transform: translateX(-50%);
            width: 2px; height: 40px;
            background: linear-gradient(to bottom, #ff96ff, transparent);
            filter: blur(2px); opacity: 0.6;
        }

        .butterfly svg {
            width: 100%; height: 100%;
            fill: #ff96ff;
            filter: drop-shadow(0 0 8px #ff96ff);
            animation: wing-flap 0.4s infinite alternate ease-in-out;
        }

        @keyframes wing-flap { from { transform: scaleX(1); } to { transform: scaleX(0.3); } }

        @keyframes butterfly-fly {
            0% { transform: translate(0, 450px) rotate(0deg); opacity: 0; }
            15% { opacity: 0.8; }
            50% { transform: translate(var(--fly-x-mid), 200px) rotate(15deg); }
            85% { opacity: 0.8; }
            100% { transform: translate(var(--fly-x-end), -50px) rotate(var(--fly-rotation-end)); opacity: 0; }
        }

        .bf1 { left: 15%; animation-duration: 9s; --fly-x-mid: 30px; --fly-x-end: -40px; --fly-rotation-end: -30deg; }
        .bf2 { left: 45%; animation-duration: 12s; animation-delay: 3s; --fly-x-mid: -40px; --fly-x-end: 50px; --fly-rotation-end: 40deg; }
        .bf3 { left: 75%; animation-duration: 10s; animation-delay: 6s; --fly-x-mid: 20px; --fly-x-end: -30px; --fly-rotation-end: -20deg; }

        /* --- PROFILBILD & TEXT --- */
        .profile { margin-bottom: 25px; position: relative; z-index: 20; }
        .profile img {
            width: 110px; height: 110px; border-radius: 50%;
            border: 2px solid rgba(255, 191, 255, 0.4); 
            object-fit: cover;
            box-shadow: 0 0 25px rgba(255, 150, 255, 0.5);
            animation: pulseGlow 4s infinite alternate;
            display: block; margin: 0 auto 15px auto;
        }

        @keyframes pulseGlow {
            0% { transform: scale(1); box-shadow: 0 0 15px rgba(255, 150, 255, 0.3); }
            100% { transform: scale(1.03); box-shadow: 0 0 35px rgba(255, 150, 255, 0.6); }
        }

        .profile h1 {
            font-size: 1.7rem; margin: 0 0 5px 0; letter-spacing: 4px;
            text-transform: uppercase; font-weight: 300;
            text-shadow: 0 0 15px rgba(255, 150, 255, 0.6); color: #fce4ff;
        }

        .profile-bio {
            font-size: 0.85rem; color: #fce4ff;
            text-shadow: 0 0 15px rgba(255, 150, 255, 0.6);
        }

        /* --- BUTTONS (JETZT PERFEKT ZENTRIERT) --- */
        .links-container { display: flex; flex-direction: column; gap: 12px; position: relative; z-index: 20; }
        
        .link-card, .copy-btn {
            background-color: rgba(255, 255, 255, 0.04); color: #e1bee7;
            text-decoration: none; 
            display: flex; 
            align-items: center; 
            justify-content: center; /* Zentriert Icon und Text horizontal */
            padding: 14px 25px; 
            border-radius: 14px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(10px); 
            transition: all 0.3s ease;
            text-transform: uppercase; 
            font-size: 0.85rem; 
            cursor: pointer; 
            width: 100%; 
            font-family: inherit;
        }

        .btn-icon {
            width: 18px;
            height: 18px;
            margin-right: 12px; /* Abstand zwischen Icon und Text */
            fill: currentColor;
            flex-shrink: 0;
        }

        .link-card:hover, .copy-btn:hover {
            transform: translateY(-2px); background-color: rgba(255, 150, 255, 0.15);
            border-color: rgba(255, 150, 255, 0.6); color: white;
            box-shadow: 0 0 15px rgba(255, 150, 255, 0.2);
        }
        
        .copy-btn.copied { background-color: rgba(57, 255, 20, 0.2) !important; border-color: rgba(57, 255, 20, 0.6) !important; }
    </style>
</head>

    <script>
        document.getElementById('discordBtn').addEventListener('click', function() {
            const discordId = this.getAttribute('data-discord-id');
            const btnText = document.getElementById('copyBtnText');
            navigator.clipboard.writeText(discordId).then(() => {
                this.classList.add('copied');
                btnText.innerText = 'KOPIERT!';
                setTimeout(() => {
                    this.classList.remove('copied');
                    btnText.innerText = 'Discord';
                }, 2000);
